name: Tests

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily drift catcher, off the :00/:30 peak-load minutes — same reasoning
    # as willow-mcp's: this repo goes quiet between changes, and a new Python
    # point release or python-gnupg/gpg bump should not wait for the next
    # push to surface.
    - cron: "37 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor and current for requires-python >= 3.10.
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        # python-gnupg wraps the gpg binary; ubuntu runners ship it.
        run: python -m pytest tests/ -q
